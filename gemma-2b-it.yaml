# gcr.io/spencerjp-gke-dev/ray/anyscale/ray:2.51.0-slim-py312-cu121-serve0
# gcr.io/spencerjp-gke-dev/rayturbo/runtime-py312-cu121:2025-11-10-serve0
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: gemma-2b-it
spec:
  serveConfigV2: |
    applications:
    - name: llm_app
      route_prefix: "/"
      import_path: ray.serve.llm:build_openai_app
      args:
        llm_configs:
            - model_loading_config:
                model_id: gemma-2b-it
                model_source: google/gemma-2b-it
              accelerator_type: L4
              log_engine_metrics: true
              deployment_config:
                autoscaling_config:
                    min_replicas: 4
                    max_replicas: 4
                health_check_period_s: 600
                health_check_timeout_s: 300
                request_router_config:
                  request_router_class: "ray.serve.llm.request_router.InferenceGatewayRequestRouter"
              runtime_env:
                env_vars:
                    VLLM_USE_V1: "1"
                    TENSOR_PARALLELISM: "2"
  rayClusterConfig:
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        metadata:
          labels:
            ai.gke.io: rayserve
        spec:
          containers:
            - name: ray-head
              image: gcr.io/spencerjp-gke-dev/ray-llm:7b2c07aee4
              resources:
                limits:
                  #cpu: "2"
                  memory: "8Gi"
                  ephemeral-storage: "32Gi"
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  ephemeral-storage: "32Gi"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              env:
                - name: RAY_SERVE_THROUGHPUT_OPTIMIZED
                  value: "1"
                - name: RAY_SERVE_ENABLE_HA_PROXY
                  value: "1"
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: hf_api_token
    rayVersion: 2.53.0
    workerGroupSpecs:
      - replicas: 4
        minReplicas: 4
        maxReplicas: 4
        groupName: gpu-group
        rayStartParams: {}
        template:
          metadata:
            labels:
              ai.gke.io: rayserve
              inferencepool: gemma-2b-it
          spec:
            containers:
              - name: llm
                image: gcr.io/spencerjp-gke-dev/ray-llm:7b2c07aee4
                env:
                  - name: RAY_SERVE_THROUGHPUT_OPTIMIZED
                    value: "1"
                  - name: RAY_SERVE_ENABLE_DIRECT_INGRESS
                    value: "1"
                  - name: RAY_SERVE_ENABLE_HA_PROXY
                    value: "0"
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: hf_api_token
                resources:
                  limits:
                    #cpu: "8"
                    #memory: "64Gi"
                    nvidia.com/gpu: "1"
                    ephemeral-storage: "24Gi"
                  requests:
                    cpu: "8"
                    memory: "64Gi"
                    nvidia.com/gpu: "1"
                    ephemeral-storage: "24Gi"
            nodeSelector:
              cloud.google.com/gke-accelerator: nvidia-l4
